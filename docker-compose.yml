services:

  db:
    image: postgres:16

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: yashwanth
      POSTGRES_DB: github_tracker

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: .

    depends_on:
      - db

    env_file:
      - .env

    ports:
      - "8000:8000"

volumes:
  postgres_data: